---
modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      copr:
        - name: avengemedia/danklinux
          chroot: fedora-rawhide-x86_64
        - name: avengemedia/dms
          chroot: fedora-rawhide-x86_64
        - name: yalter/niri-git
          chroot: fedora-rawhide-x86_64
    install:
      install-weak-deps: false
      packages:
        - terra-release
        - greetd
        - dms-greeter
        - niri
        - qt6-qtwayland
        - qt5-qtwayland
        - dms
        - dgop
        - dsearch
        - sudo-rs
        - git
        - ghostty
        - rio
        - qemu
        - chezmoi
        - topgrade
        - mise
        - podman-docker
        - podman-compose
        - distrobox
        - lm_sensors
        - power-profiles-daemon
        - openssl
        - cosmic-files
    remove:
      auto-remove: false
      packages:
        - flatpak
        # - firefox
