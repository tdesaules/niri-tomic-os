# Rename AMD SoundWire nodes and prevent suspend timeout
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_output.pci-0000_c4_00.5-platform-amd_sdw.pro-output-0" }
    ]
    actions = {
      update-props = {
        node.description = "Headphones Jack"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_c4_00.5-platform-amd_sdw.pro-output-2" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        node.description = "Internal Speakers"
      }
    }
  }
]
