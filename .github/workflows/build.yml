name: Build niri-tomic-os
on:
  push:
    branches:
      - main

jobs:
  build-and-iso:
    name: Build Image and ISO
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 1. Build the OCI Image
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: "recipes/recipe.yml"
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true

      # 2. Build the ISO using the correct modern action
      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          image_name: "niri-tomic-os"
          image_repo: "ghcr.io/${{ github.repository_owner }}"
          image_tag: "latest"
          version: "44" # Matching your Fedora 44 base
          variant: "main"
          arch: "x86_64"

      # 3. Upload the resulting ISO
      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}.sha256
          retention-days: 7
